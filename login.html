<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Glass Vault Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  /* 🌄 Background Image */
  background: url("https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?auto=format&fit=crop&w=1600&q=80");
  background-size: cover;
  background-position: center;
  overflow: hidden;
}

/* dark overlay for readability */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.55);
}

/* floating glow blobs */
body::after {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  background: rgba(34, 211, 238, 0.25);
  filter: blur(100px);
  top: 10%;
  left: 10%;
  border-radius: 50%;
  animation: float 6s infinite alternate;
}

@keyframes float {
  from { transform: translateY(0px) scale(1); }
  to { transform: translateY(40px) scale(1.1); }
}

/* container */
.container {
  width: 380px;
  height: 500px;
  perspective: 1400px;
  z-index: 2;
}

/* card */
.card {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1s cubic-bezier(0.23, 1, 0.32, 1);
}

/* flip */
.container.flipped .card {
  transform: rotateY(180deg);
}

/* glass face */
.face {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 22px;

  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(18px);

  border: 1px solid rgba(255,255,255,0.2);
  box-shadow:
    0 10px 40px rgba(0,0,0,0.6),
    inset 0 0 20px rgba(255,255,255,0.05);

  color: white;
  padding: 35px;
  backface-visibility: hidden;

  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* back */
.back {
  transform: rotateY(180deg);
}

/* title */
h2 {
  text-align: center;
  margin-bottom: 25px;
  letter-spacing: 3px;
  font-weight: 600;
  text-shadow: 0 0 10px rgba(255,255,255,0.2);
}

/* inputs */
input {
  width: 100%;
  padding: 13px;
  margin: 10px 0;
  border: none;
  border-radius: 14px;

  background: rgba(255,255,255,0.12);
  color: white;

  outline: none;
  transition: 0.3s;
}

input:focus {
  background: rgba(255,255,255,0.2);
  box-shadow: 0 0 12px rgba(34,211,238,0.5);
}

/* button */
button {
  width: 100%;
  padding: 13px;
  margin-top: 15px;

  border: none;
  border-radius: 14px;

  background: linear-gradient(135deg, #06b6d4, #22c55e);
  color: white;
  font-weight: bold;

  cursor: pointer;
  transition: 0.3s;
  letter-spacing: 1px;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(34,211,238,0.4);
}

/* switch text */
.switch {
  text-align: center;
  margin-top: 18px;
  font-size: 13px;
  color: #93c5fd;
  cursor: pointer;
}

.switch:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="container" id="container">

  <div class="card">

    <!-- LOGIN -->
    <div class="face front">
      <h2>WELCOME BACK 🔐</h2>
<input id="login-username" type="text" placeholder="Username">
<input id="login-password" type="password" placeholder="Password">

      <button onclick="login()">LOGIN</button>

      <div class="switch" onclick="flip()">
        No account? Create one →
      </div>
    </div>

    <!-- SIGNUP -->
    <div class="face back">
      <h2>JOIN US 🚀</h2>

     <input id="signup-username" type="text" placeholder="Username">
<input id="signup-email" type="email" placeholder="Email">
<input id="signup-password" type="password" placeholder="Password">

      <button onclick="signup()">SIGN UP</button>

      <div class="switch" onclick="flip()">
        ← Back to login
      </div>
    </div>

  </div>
</div>

<script>
function flip() {
  document.getElementById("container").classList.toggle("flipped");
}


</script>

<script src="login.js"></script>

</body>
</html>
