<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    .navbar {
      background: #1e293b;
      padding: 15px;
      display: flex;
      justify-content: space-between;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .logout {
      background: crimson;
      color: white;
    }

    .action {
      background: #22c55e;
      color: white;
      margin-right: 10px;
    }
  </style>
</head>

<body>

  <div class="navbar">
    <h2>💳 My Bank</h2>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <div class="container">

    <!-- USER INFO -->
    <div class="card">
      <h3>Welcome, <span id="username">...</span></h3>
      <h2>Balance: ₦<span id="balance">0.00</span></h2>
    </div>

    <!-- ACTIONS -->
    <div class="card">
      <button class="action" onclick="goTransfer()">Transfer 💸</button>
      <button class="action" onclick="goWithdraw()">Withdraw 💳</button>
    </div>

    <!-- TRANSACTIONS -->
    <div class="card">
      <h3>Transaction History</h3>
      <ul id="transactions"></ul>
    </div>

  </div>

<script>
/* ================= LOAD USER ================= */
async function loadUser() {
  const res = await fetch("/user");
  const data = await res.json();

  if (res.ok) {
    document.getElementById("username").innerText = data.username;
    document.getElementById("balance").innerText = data.balance;
  } else {
    window.location.href = "/login";
  }
}

/* ================= LOAD TRANSACTIONS ================= */
async function loadTransactions() {
  const res = await fetch("/transactions");
  const data = await res.json();

  const list = document.getElementById("transactions");
  list.innerHTML = "";

  data.forEach(tx => {
    const li = document.createElement("li");
    li.textContent = `${tx.type.toUpperCase()} - ₦${tx.amount} → ${tx.recipient} (${tx.bank})`;
    list.appendChild(li);
  });
}

/* ================= NAVIGATION ================= */
function goTransfer() {
  window.location.href = "/transfer";
}

function goWithdraw() {
  window.location.href = "/withdraw";
}

/* ================= LOGOUT ================= */
async function logout() {
  await fetch("/logout");
  window.location.href = "/login";
}

/* ================= INIT ================= */
loadUser();
loadTransactions();
</script>

</body>
</html>
