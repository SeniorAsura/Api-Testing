<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bank Transfer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  /* same cinematic background as login/signup */
  background: url("https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?auto=format&fit=crop&w=1600&q=80");
  background-size: cover;
  background-position: center;
  overflow: hidden;
}

/* dark overlay */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at top, rgba(0,0,0,0.35), rgba(0,0,0,0.88));
}

/* neon glow orb */
body::after {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: rgba(34, 211, 238, 0.22);
  filter: blur(120px);
  top: 10%;
  left: 10%;
  border-radius: 50%;
  animation: float 7s ease-in-out infinite alternate;
}

@keyframes float {
  from { transform: translateY(0px) scale(1); }
  to { transform: translateY(50px) scale(1.1); }
}

/* container matches login size */
.container {
  width: 380px;
  height: auto;
  z-index: 2;
}

/* glass card */
.card {
  padding: 40px;

  border-radius: 26px;

  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(22px);

  border: 1px solid rgba(255,255,255,0.15);

  box-shadow:
    0 20px 60px rgba(0,0,0,0.7),
    inset 0 0 25px rgba(255,255,255,0.05);

  color: white;
}

/* title (matching login style) */
h2 {
  text-align: center;
  margin-bottom: 25px;
  letter-spacing: 4px;
  font-weight: 600;
  text-transform: uppercase;
  color: #e2e8f0;
  text-shadow: 0 0 15px rgba(34,211,238,0.25);
}

/* labels */
label {
  font-size: 12px;
  color: #93c5fd;
  margin-top: 10px;
  display: block;
}

/* inputs + select unified style */
input, select {
  width: 100%;
  padding: 14px;
  margin-top: 8px;
  margin-bottom: 12px;

  border: none;
  border-radius: 14px;

  background: rgba(255,255,255,0.10);
  color: white;

  outline: none;

  border: 1px solid rgba(255,255,255,0.08);
  transition: 0.3s;
}

input:focus, select:focus {
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(34,211,238,0.6);
  box-shadow: 0 0 15px rgba(34,211,238,0.3);
}

/* button matches login/signup */
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;

  border: none;
  border-radius: 14px;

  background: linear-gradient(135deg, #06b6d4, #22c55e);
  color: white;

  font-weight: bold;
  letter-spacing: 2px;

  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px) scale(1.04);
  box-shadow: 0 0 25px rgba(34,211,238,0.4);
}

/* status text */
.status {
  margin-top: 15px;
  text-align: center;
  font-size: 13px;
  color: #93c5fd;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h2>TRANSFER</h2>

    <label>Beneficiary Name</label>
    <input type="text" id="name" placeholder="e.g. John Doe">

    <label>Account Number</label>
    <input type="text" id="account" placeholder="1234567890">

    <label>Bank</label>
    <select id="bank">
      <option>Zenith Bank</option>
      <option>UBA</option>
      <option>GTBank</option>
      <option>Access Bank</option>
      <option>First Bank</option>
    </select>

    <label>Amount (₦)</label>
    <input type="number" id="amount" placeholder="0.00">

    <label>Narration</label>
    <input type="text" id="note" placeholder="Optional note">

    <button onclick="sendMoney()">Send Money</button>

    <div class="status" id="status"></div>

  </div>
</div>

<script>
function sendMoney() {
  let name = document.getElementById("name").value;
  let amount = document.getElementById("amount").value;

  if (!name || !amount) {
    document.getElementById("status").innerText = "❌ Fill required fields";
    return;
  }

  document.getElementById("status").innerText =
    "⏳ Processing transfer...";

  setTimeout(() => {
    document.getElementById("status").innerText =
      "✅ Transfer Successful to " + name;
  }, 2000);
}
</script>

</body>
</html>
